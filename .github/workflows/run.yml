name: Парсер ноутбуков (раз в 2 дня)

on:
  schedule:
    - cron: "0 6 */2 * *"
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Установка зависимостей
        run: pip install -r requirements.txt

      - name: Установка браузера Playwright
        run: |
          sudo apt-get install -y libasound2t64
          playwright install chromium --with-deps

      - name: Запуск агента
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING: ${{ secrets.TG_SESSION_STRING }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          REPORT_CHAT_ID: ${{ secrets.REPORT_CHAT_ID }}
        run: python main.py

      - name: Сохранить Excel как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: laptops-${{ github.run_number }}
          path: laptops_data.xlsx
          retention-days: 30
